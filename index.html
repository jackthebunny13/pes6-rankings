<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project PES6</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .header {
            background: transparent;
            padding: 15px 20px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .header p { opacity: 0.8; margin-top: 5px; }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        .tab:hover { background: rgba(255,255,255,0.2); }
        .tab.active {
            background: linear-gradient(135deg, #e94560, #533483);
            box-shadow: 0 4px 15px rgba(233,69,96,0.4);
        }
        .content { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .section { display: none; }
        .section.active { display: block; }
        
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .ranking-table th {
            background: rgba(83, 52, 131, 0.5);
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        .ranking-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .ranking-table tr:hover { background: rgba(255,255,255,0.1); }
        .rank { font-weight: bold; font-size: 1.2em; width: 50px; }
        .rank-1 { color: #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        .player-name { font-weight: 600; font-size: 1.1em; }
        .team-badge {
            background: rgba(255,255,255,0.15);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
        }
        .pos-badge {
            background: rgba(233,69,96,0.3);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .score { font-weight: bold; font-size: 1.3em; color: #4ecca3; }
        .ovr {
            font-weight: bold;
            font-size: 1.4em;
            padding: 6px 12px;
            border-radius: 8px;
            text-align: center;
            min-width: 50px;
            display: inline-block;
        }
        .ovr-elite { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        .ovr-world { background: linear-gradient(135deg, #4ecca3, #45b7d1); color: #000; }
        .ovr-great { background: linear-gradient(135deg, #45b7d1, #667eea); color: #fff; }
        .ovr-good { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .ovr-average { background: rgba(255,255,255,0.2); color: #fff; }
        
        /* Football Pitch */
        .team-display { max-width: 700px; margin: 0 auto; }
        .pitch {
            background: linear-gradient(to bottom, #2d5a27 0%, #3d7a37 50%, #2d5a27 100%);
            border-radius: 15px;
            padding: 15px 10px;
            position: relative;
            min-height: 380px;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .pitch::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 10%;
            right: 10%;
            height: 2px;
            background: rgba(255,255,255,0.3);
        }
        .pitch::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        .pitch-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .player-spot.captain { }
        .pitch-row.strikers { margin-top: 5px; }
        .pitch-row.cam { margin-bottom: 20px; position: relative; z-index: 1; }
        .pitch-row.cdm { margin-bottom: 20px; position: relative; z-index: 2; }
        .pitch-row.midfield { margin-bottom: 25px; position: relative; z-index: 2; }
        .pitch-row.defense { margin-bottom: 20px; }
        .pitch-row.gk { margin-bottom: 5px; }
        .player-spot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            min-width: 110px;
        }
        .player-spot .ovr {
            font-size: 1em;
            padding: 3px 8px;
        }
        .player-spot .pname {
            font-size: 0.85em;
            font-weight: 500;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            white-space: nowrap;
        }
        
        /* Bench */
        .bench-section {
            margin-top: 25px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .bench-section h4 {
            margin-bottom: 12px;
            text-align: center;
        }
        .bench-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .bench-player {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.1);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.9em;
        }
        
        /* Interactive Player Selector */
        .player-spot {
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px;
            border-radius: 10px;
            border: 2px solid transparent;
        }
        .player-spot:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
        }
        .player-spot.selected {
            border-color: #4ecca3;
            background: rgba(78, 204, 163, 0.2);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(78, 204, 163, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(78, 204, 163, 0); }
        }
        .slot-label {
            font-size: 0.65em;
            opacity: 0.6;
            display: block;
            margin-bottom: 2px;
        }
        
        .player-selector {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            transition: all 0.3s;
        }
        .player-selector h4 {
            margin-bottom: 10px;
        }
        .player-selector.active {
            background: rgba(78, 204, 163, 0.1);
            border: 1px solid rgba(78, 204, 163, 0.3);
        }
        .selector-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 6px;
        }
        .selector-player {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.82em;
            line-height: 1.1;
        }
        .selector-player:hover {
            background: rgba(255,255,255,0.15);
        }
        .selector-player.in-lineup {
            opacity: 0.5;
        }
        .selector-player.in-lineup:hover {
            opacity: 1;
            background: rgba(233, 69, 96, 0.2);
        }
        .selector-player.current {
            background: rgba(78, 204, 163, 0.3);
            opacity: 1;
        }
        .selector-player .sp-name {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .selector-player .in-xi {
            font-size: 0.8em;
        }
        .cancel-btn {
            display: block;
            margin: 15px auto 0;
            padding: 8px 20px;
            background: rgba(233, 69, 96, 0.3);
            border: none;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            font-size: 0.9em;
        }
        .cancel-btn:hover {
            background: rgba(233, 69, 96, 0.5);
        }
        .nat-flag {
            font-size: 1em;
        }
        /* Drag and Drop */
        .dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }
        .drag-over {
            background: rgba(78, 204, 163, 0.3) !important;
            border: 2px dashed #4ecca3 !important;
            transform: scale(1.05);
        }
        .selector-player[draggable="true"] {
            cursor: grab;
        }
        .selector-player[draggable="true"]:active {
            cursor: grabbing;
        }
        .player-spot[draggable="true"] {
            cursor: grab;
        }
        .player-spot[draggable="true"] > * {
            pointer-events: none;
        }
        /* Formation Actions */
        .formation-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.2s;
        }
        .export-btn {
            background: linear-gradient(90deg, #4ecca3, #45b7d1);
            color: #000;
        }
        .reset-btn {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }
        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        /* League Selector */
        .league-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .league-btn {
            font-size: 1.4em;
            padding: 6px 8px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 70px;
            flex: 1;
            max-width: 100px;
            text-align: center;
        }
        .league-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .league-btn.active {
            border: none;
            background: linear-gradient(135deg, #e94560, #533483);
        }
        .skill-macro {
            font-size: 0.8em;
            padding: 8px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            color: #aaa;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .skill-macro:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }
        .skill-macro.active {
            background: linear-gradient(135deg, #e94560, #533483);
            border: none;
            color: #fff;
        }
        .skill-pill {
            font-size: 0.75em;
            padding: 6px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            cursor: pointer;
            color: #aaa;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .skill-pill:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }
        .skill-pill.active {
            background: linear-gradient(135deg, #e94560, #533483);
            border: none;
            color: #fff;
        }
        /* Team Selector */
        #team-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .team-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.2s;
        }
        .team-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .team-btn.active {
            background: linear-gradient(135deg, #e94560, #533483);
        }
        /* Player Tooltip */
        .player-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 20, 40, 0.95);
            border: 1px solid rgba(78, 204, 163, 0.5);
            border-radius: 10px;
            padding: 10px 12px;
            min-width: 160px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
            transition-delay: 0.5s;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .player-spot {
            position: relative;
        }
        .player-spot:hover .player-tooltip {
            opacity: 1;
            visibility: visible;
            pointer-events: none;
        }
        .player-spot:hover {
            z-index: 50;
        }
        .tooltip-header {
            font-size: 1em;
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }
        .tooltip-pos {
            font-size: 0.8em;
            opacity: 0.8;
            margin-bottom: 4px;
        }
        .tooltip-foot {
            font-size: 0.8em;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .tooltip-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px 10px;
            font-size: 0.75em;
        }
        .tooltip-stats span {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .selector-list.tribuna {
            opacity: 0.7;
        }
        .tribuna-player {
            background: rgba(255,255,255,0.04);
        }
        .stat-bar {
            width: 50px; height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
            margin-left: 5px;
        }
        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecca3, #45b7d1);
            border-radius: 4px;
        }
        
        .pos-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .pos-tab {
            padding: 10px 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }
        .pos-tab:hover { background: rgba(255,255,255,0.2); }
        .pos-tab.active { background: linear-gradient(135deg, #e94560, #533483); border: none; }
        .pos-tab .emoji { margin-right: 5px; }
        .pos-tab .pos-code { font-weight: bold; }
        .pos-tab .pos-name { font-size: 0.7em; opacity: 0.8; margin-top: 2px; }
        
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .team-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s;
        }
        .team-card:hover { transform: translateY(-5px); }
        .team-card h3 { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid rgba(255,255,255,0.2); }
        .team-player {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .team-player:last-child { border-bottom: none; }
        
        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1em;
            margin-bottom: 20px;
        }
        .search-box::placeholder { color: rgba(255,255,255,0.5); }
        .search-box:focus { outline: none; background: rgba(255,255,255,0.15); }
        
        .pos-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #4ecca3;
        }
        .formula-box {
            background: rgba(78, 204, 163, 0.1);
            border-left: 4px solid #4ecca3;
            padding: 10px 20px;
            margin-bottom: 20px;
            border-radius: 0 10px 10px 0;
        }
        .formula-box:empty {
            display: none;
        }
        .formula-desc {
            font-size: 1em;
            margin-bottom: 10px;
            color: #fff;
        }
        .formula-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .formula-primary, .formula-secondary {
            flex: 1;
            min-width: 200px;
        }
        .formula-primary h4, .formula-secondary h4 {
            font-size: 0.85em;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.7;
        }
        .formula-primary h4 { color: #4ecca3; }
        .formula-secondary h4 { color: #e94560; }
        .formula-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .formula-tag {
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
        }
        .formula-primary .formula-tag {
            background: rgba(78, 204, 163, 0.2);
            border: 1px solid rgba(78, 204, 163, 0.4);
        }
        .formula-secondary .formula-tag {
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid rgba(233, 69, 96, 0.3);
        }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8em; }
            .ranking-table { font-size: 0.9em; }
            .stat-bar { display: none; }
            .pos-tab { padding: 8px 12px; font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Project PES6</h1>
        <div style="font-size:0.65em;color:#aaa;margin-top:6px;letter-spacing:1px;font-weight:300;">Powered by Zio Tore рџ¦њ</div>
        <div style="font-size:0.58em;color:#8f8f8f;margin-top:2px;margin-bottom:8px;letter-spacing:0.6px;font-weight:300;">Roma 4</div>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="showSection('positions')">рџ“‹ Ranking Ruoli</button>
        <button class="tab" onclick="showSection('team-rankings')">рџЏџпёЏ Ranking Squadre</button>
        <button class="tab" onclick="showSection('teams')">вљЅ Squadre</button>
        <button class="tab" onclick="showSection('skill-rankings')">рџЋЇ Top 10 Skills</button>
    </div>
    
    <div class="content">
        <!-- By Position -->
        <div id="positions" class="section active">
            <div class="pos-tabs" id="pos-tabs"></div>
            <div class="pos-title" id="pos-title" style="display:none;"></div>
            <div id="sub-filter-box"></div>
            <div class="formula-box" id="formula-box"></div>
            <table class="ranking-table">
                <thead style="display:none;">
                    <tr>
                        <th>#</th>
                        <th>Giocatore</th>
                        <th>OVR</th>
                        <th>Ruolo</th>
                        <th>Naz</th>
                        <th>Squadra</th>
                    </tr>
                </thead>
                <tbody id="pos-body"></tbody>
            </table>
        </div>
        
        <!-- Team Rankings -->
        <div id="team-rankings" class="section">
            
            <div id="team-rankings-filter" style="text-align:center;margin-bottom:16px;"></div>
            <div id="team-rankings-content"></div>
        </div>

        <!-- Squadre -->
        <div id="skill-rankings" class="section">
            <div id="skill-filter" style="text-align:center;margin-bottom:16px;"></div>
            <div id="skill-rankings-content"></div>
        </div>

        <div id="teams" class="section">
            
            <div class="league-selector">
                <button class="league-btn active" onclick="selectLeague('italy')">рџ‡®рџ‡№<br><span style="font-size:0.55em;color:#fff;line-height:1;">Serie A</span><br><span style="font-size:0.5em;color:rgba(255,255,255,0.6);">15/20</span></button>
                <button class="league-btn" onclick="selectLeague('england')">рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї<br><span style="font-size:0.55em;color:#fff;line-height:1;">Premier</span><br><span style="font-size:0.5em;color:rgba(255,255,255,0.6);">3/18</span></button>
                <button class="league-btn" onclick="selectLeague('netherlands')">рџ‡ірџ‡±<br><span style="font-size:0.55em;color:#fff;line-height:1;">Eredivisie</span><br><span style="font-size:0.5em;color:rgba(255,255,255,0.6);">3/3</span></button>
                <button class="league-btn" onclick="selectLeague('spain')">рџ‡Єрџ‡ё<br><span style="font-size:0.55em;color:#fff;line-height:1;">Liga</span><br><span style="font-size:0.5em;color:rgba(255,255,255,0.6);">1/14</span></button>
            </div>
            <div id="team-selector"></div>
            <div id="team-content"></div>
        </div>
    </div>
    
    <script>
        let data = {};
        let currentPos = localStorage.getItem('pes_current_pos') || 'ALL';
        
        const posEmoji = {
            'ALL': 'рџЊџ', 'GK': 'рџ§¤', 'CB': 'рџ›ЎпёЏ', 'SB': 'рџЏѓ', 'SW': 'рџЋ–пёЏ',
            'WB': 'в†”пёЏ', 'DMF': 'вљ“', 'CMF': 'рџЋЇ', 'SMF': 'рџ’Ё',
            'AMF': 'рџЋ©', 'WF': 'вљЎ', 'SS': 'рџ”Ґ', 'CF': 'вљЅ'
        };
        
        // Merged positions: CB+SW, SB+WB, SMF+WF
        const posOrder = ['ALL', 'GK', 'CB', 'SB', 'CMF', 'SMF', 'AMF', 'CF'];
        
        // Position merges
        const posMerge = {

        // Current formation state per team
        let formations = {};
        
        function getTeamConfig() {
            return teamConfigs[currentTeam];
        }
        
        function getTeamStateStore() {
            try {
                return JSON.parse(localStorage.getItem('pes_team_state_v1') || '{}');
            } catch (e) {
                return {};
            }
        }
        
        function saveTeamStateStore(store) {
            localStorage.setItem('pes_team_state_v1', JSON.stringify(store));
        }
        
        function getRosterFingerprint(team) {
            const cfg = teamConfigs[team];
            if (!cfg || !cfg.roster) return '';
            return cfg.roster
                .map(function(p) {
                    const pos2 = (p.pos2 || []).slice().sort().join('|');
                    return [p.name, p.pos, pos2].join('::');
                })
                .sort()
                .join('##');
        }
        
        function getSavedTeamState(team) {
            const store = getTeamStateStore();
            return store[team] || null;
        }
        
        function saveCurrentTeamState() {
            const cfg = getTeamConfig();
            if (!cfg) return;
            const store = getTeamStateStore();
            const lineup = formations[currentTeam] ? formations[currentTeam].slice() : (cfg.defaultLineup || []).slice();
            const bench = getBench().map(function(p) { return p.id; });
            const readyTeams = getReadyTeams();
            store[currentTeam] = {
                lineup: lineup,
                bench: bench,
                ready: !!readyTeams[currentTeam],
                rosterFingerprint: getRosterFingerprint(currentTeam)
            };
            saveTeamStateStore(store);
        }
        
        function restoreTeamState(team) {
            const cfg = teamConfigs[team];
            if (!cfg) return;
            const saved = getSavedTeamState(team);
            const currentFingerprint = getRosterFingerprint(team);
            const rosterIds = new Set(cfg.roster.map(function(p) { return p.id; }));
            if (!saved) {
                formations[team] = [...cfg.defaultLineup];
                return;
            }
            if (saved.rosterFingerprint !== currentFingerprint) {
                formations[team] = [...(cfg.defaultLineup || [])];
                localStorage.setItem('pes_bench_' + team, JSON.stringify([]));
                const readyTeams = getReadyTeams();
                delete readyTeams[team];
                localStorage.setItem('pes_ready_teams', JSON.stringify(readyTeams));
                return;
            }
            const validSavedLineup = Array.isArray(saved.lineup)
                ? saved.lineup.filter(function(id) { return rosterIds.has(id); })
                : [];
            const defaultLineup = cfg.defaultLineup || [];
            const used = new Set(validSavedLineup);
            while (validSavedLineup.length < defaultLineup.length) {
                const fallback = defaultLineup[validSavedLineup.length];
                if (fallback && rosterIds.has(fallback) && !used.has(fallback)) {
                    validSavedLineup.push(fallback);
                    used.add(fallback);
                } else {
                    const next = cfg.roster.find(function(p) { return !used.has(p.id); });
                    validSavedLineup.push(next ? next.id : null);
                    if (next) used.add(next.id);
                }
            }
            formations[team] = validSavedLineup;
            if (saved.lineup && saved.rosterFingerprint === currentFingerprint && Array.isArray(saved.bench)) {
                localStorage.setItem('pes_bench_' + team, JSON.stringify(saved.bench.filter(function(id) { return rosterIds.has(id) && !used.has(id); })));
            } else if (saved.bench && Array.isArray(saved.bench)) {
                localStorage.setItem('pes_bench_' + team, JSON.stringify(saved.bench.filter(function(id) { return rosterIds.has(id) && !used.has(id); })));
            }
            const readyTeams = getReadyTeams();
            if (saved.ready) readyTeams[team] = true;
            else delete readyTeams[team];
            localStorage.setItem('pes_ready_teams', JSON.stringify(readyTeams));
        }
        
        function getFormation() {
            const cfg = getTeamConfig();
            if (!cfg) return null;
            if (!formations[currentTeam]) {
                restoreTeamState(currentTeam);
                if (!formations[currentTeam]) {
                    formations[currentTeam] = [...cfg.defaultLineup];
                }
            }
            return formations[currentTeam];
        }
        
        function saveFormation() {
            const lineup = formations[currentTeam];
            if (lineup) {
                localStorage.setItem('pes_formation_' + currentTeam, JSON.stringify(lineup));
                saveCurrentTeamState();
            }
        }
        
        function exportFormation() {
            const cfg = getTeamConfig();
            const lineup = getFormation();
            if (!cfg) return;
            const data = {
                team: currentTeam,
                formation: cfg.subtitle,
                lineup: lineup.map((id, idx) => {
                    const p = getPlayerById(id);
                    return { slot: cfg.slots[idx], player: p ? p.name : '?', ovr: p ? p.ovr : 0 };
                }),
                bench: getBench().slice(0, 7).map(p => ({ player: p.name, pos: p.pos, ovr: p.ovr }))
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentTeam.toLowerCase() + '_formation.json';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function resetFormation() {
            const cfg = getTeamConfig();
            if (!cfg) return;
            if (confirm('Ripristinare la formazione originale?')) {
                formations[currentTeam] = [...cfg.defaultLineup];
                localStorage.removeItem('pes_bench_' + currentTeam);
                localStorage.removeItem('pes_formation_' + currentTeam);
                const store = getTeamStateStore();
                delete store[currentTeam];
                saveTeamStateStore(store);
                const readyTeams = getReadyTeams();
                delete readyTeams[currentTeam];
                localStorage.setItem('pes_ready_teams', JSON.stringify(readyTeams));
                renderTeams();
            }
        }
        function getReadyTeams() {
            try {
                return JSON.parse(localStorage.getItem('pes_ready_teams') || '{}');
            } catch (e) {
                return {};
            }
        }
        function isTeamReady(team) {
            return !!getReadyTeams()[team];
        }
        function toggleTeamReady() {
            var readyTeams = getReadyTeams();
            readyTeams[currentTeam] = !readyTeams[currentTeam];
            if (!readyTeams[currentTeam]) delete readyTeams[currentTeam];
            localStorage.setItem('pes_ready_teams', JSON.stringify(readyTeams));
            saveCurrentTeamState();
            renderTeamSelector();
            renderTeams();
        }

                teams: ['Arsenal', 'Liverpool', 'Manchester United']
            },
            netherlands: {
                name: 'Eredivisie',
                flag: 'рџ‡ірџ‡±',
                teams: ['Ajax', 'Feyenoord', 'PSV Eindhoven']
            },
            spain: {
                name: 'Liga',
                flag: 'рџ‡Єрџ‡ё',
                teams: ['Real Madrid']
            },
            italy: {
                name: 'Serie A',
                flag: 'рџ‡®рџ‡№',
                teams: ['Atalanta', 'Bari', 'Bologna', 'Brescia', 'Cagliari', 'Fiorentina', 'Genoa', 'Inter', 'Juventus', 'Lazio', 'Lecce', 'Milan', 'Napoli', 'Palermo', 'Parma', 'Roma']
            }
        };
        
        let currentLeague = 'italy';
        let currentTeam = 'Inter';
        
        function syncLeagueButtons() {
            document.querySelectorAll('.league-selector .league-btn').forEach(function(btn) {
                var onclick = btn.getAttribute('onclick') || '';
                var m = onclick.match(/selectLeague\('(\w+)'\)/);
                if (m) {
                    btn.classList.toggle('active', m[1] === currentLeague);
                }
            });
        }
        
        function selectLeague(league) {
            currentLeague = league;
            syncLeagueButtons();
            // Switch to first team in the new league
            var firstTeam = leagues[league].teams[0];
            currentTeam = firstTeam;
            localStorage.setItem('pes_current_team', firstTeam);
            localStorage.setItem('pes_current_section', 'teams');
            renderTeamSelector();
            renderTeams();
        }
        
        function selectTeam(team) {
            currentTeam = team;
            // Sync league to match the team
            Object.keys(leagues).forEach(function(lg) {
                if (leagues[lg].teams.indexOf(team) !== -1 && lg !== currentLeague) {
                    currentLeague = lg;
                    syncLeagueButtons();
                    renderTeamSelector();
                }
            });
            document.querySelectorAll('.team-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent === team);
            });
            localStorage.setItem('pes_current_team', team);
            renderTeams();
        }
        
        function renderTeamSelector() {
            const selector = document.getElementById('team-selector');
            const league = leagues[currentLeague];
            if (!league) return;
            
            var breakAfter = Math.ceil(league.teams.length / 2);
            selector.innerHTML = league.teams.map(function(team, idx) {
                var readyFlag = isTeamReady(team) ? ' <span style="color:#7dff9b;">вњ…</span>' : '';
                var btn = '<button class="team-btn ' + (team === currentTeam ? 'active' : '') + '" onclick="selectTeam(\'' + team + '\')">' + team + readyFlag + '</button>';
                if (idx === breakAfter - 1 && idx !== league.teams.length - 1) btn += '<div style="flex-basis:100%;height:0;"></div>';
                return btn;
            }).join('');
        }
        
        // Restore team on load
        function restoreTeam() {
            const saved = localStorage.getItem('pes_current_team');
            if (saved && teamConfigs[saved]) {
                currentTeam = saved;
                // Find which league this team belongs to
                Object.keys(leagues).forEach(function(lg) {
                    if (leagues[lg].teams.indexOf(saved) !== -1) {
                        currentLeague = lg;
                    }
                });
                syncLeagueButtons();
            }
            renderTeamSelector();
        }
        
        // Init all formations - deferred to after data loads (see fetch callback)
        
        function getOvrClass(ovr) {
            if (ovr >= 90) return 'ovr-elite';
            if (ovr >= 85) return 'ovr-world';
            if (ovr >= 80) return 'ovr-great';
            if (ovr >= 75) return 'ovr-good';
            return 'ovr-average';
        }
        
        function getPlayerById(id) {
            const cfg = getTeamConfig();
            return cfg ? cfg.roster.find(p => p.id === id) : null;
        }
        
        function getStartingIds() {
            const lineup = getFormation();
            return new Set(lineup || []);
        }
        
        function getBench() {
            const cfg = getTeamConfig();
            if (!cfg) return [];
            const startingIds = getStartingIds();
            var benchPlayers = cfg.roster.filter(p => !startingIds.has(p.id));
            const savedState = getSavedTeamState(currentTeam);
            const currentFingerprint = getRosterFingerprint(currentTeam);
            if (!savedState || savedState.rosterFingerprint !== currentFingerprint) {
                return benchPlayers.sort((a, b) => b.ovr - a.ovr);
            }
            // Check for saved bench order
            var savedOrder = localStorage.getItem('pes_bench_' + currentTeam);
            if (savedOrder) {
                try {
                    var order = JSON.parse(savedOrder);
                    if (Array.isArray(order)) {
                        var idToPlayer = {};
                        benchPlayers.forEach(function(p) { idToPlayer[p.id] = p; });
                        var ordered = order.filter(function(id) { return idToPlayer[id]; }).map(function(id) { return idToPlayer[id]; });
                        // Add any new bench players not in saved order
                        benchPlayers.forEach(function(p) { if (!order.includes(p.id)) ordered.push(p); });
                        if (ordered.length === benchPlayers.length) return ordered;
                    }
                } catch(e) {}
            }
            return benchPlayers.sort((a, b) => b.ovr - a.ovr);
        }
        
        function saveBenchOrder() {
            var bench = getBench();
            localStorage.setItem('pes_bench_' + currentTeam, JSON.stringify(bench.map(function(p) { return p.id; })));
            saveCurrentTeamState();
        }
        
        let draggedPlayerId = null;
        let selectedSlot = null;  // For click-to-swap
        let draggedBenchIdx = null;  // For bench reorder
        
        function handleBenchDragStart(e, benchIdx, playerId) {
            draggedBenchIdx = benchIdx;
            draggedPlayerId = playerId;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        
        function handleBenchDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }
        
        function handleBenchDrop(e, targetIdx) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (draggedBenchIdx === null || draggedBenchIdx === targetIdx) { draggedBenchIdx = null; return; }
            
            // Swap positions in bench order
            var bench = getBench();
            if (draggedBenchIdx < bench.length && targetIdx < bench.length) {
                var temp = bench[draggedBenchIdx];
                bench[draggedBenchIdx] = bench[targetIdx];
                bench[targetIdx] = temp;
                // Save new order
                localStorage.setItem('pes_bench_' + currentTeam, JSON.stringify(bench.map(function(p) { return p.id; })));
                saveCurrentTeamState();
            }
            draggedBenchIdx = null;
            draggedPlayerId = null;
            renderTeams();
        }
        
        function handleDragStart(e, playerId) {
            draggedPlayerId = playerId;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }
        
        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.player-spot').forEach(el => el.classList.remove('drag-over'));
        }
        
        function handleSpotClick(slotIndex) {
            const lineup = getFormation();
            if (!lineup) return;
            
            if (selectedSlot === null) {
                // First click: select this slot
                selectedSlot = slotIndex;
                document.querySelectorAll('.player-spot').forEach(el => el.classList.remove('selected'));
                var spot = document.querySelector('.player-spot[data-slot="' + slotIndex + '"]');
                if (spot) spot.classList.add('selected');
            } else if (selectedSlot === slotIndex) {
                // Clicked same slot: deselect
                selectedSlot = null;
                document.querySelectorAll('.player-spot').forEach(el => el.classList.remove('selected'));
            } else {
                // Second click: swap the two slots
                var temp = lineup[selectedSlot];
                lineup[selectedSlot] = lineup[slotIndex];
                lineup[slotIndex] = temp;
                selectedSlot = null;
                saveFormation();
                renderTeams();
            }
        }
        
        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }
        
        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }
        
        function handleDrop(e, slotIndex) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (draggedPlayerId === null) return;
            
            const lineup = getFormation();
            if (!lineup) return;
            
            // Check if dragged player is already in lineup
            const existingSlot = lineup.indexOf(draggedPlayerId);
            if (existingSlot !== -1) {
                // Swap players
                const currentPlayer = lineup[slotIndex];
                lineup[existingSlot] = currentPlayer;
            }
            
            lineup[slotIndex] = draggedPlayerId;
            draggedPlayerId = null;
            saveFormation();
            renderTeams();
        }
        
        function renderPlayerCard(p, inLineup) {

            '</div>';
        }

            const lineup = getFormation();

            function getStatsHtml(p) {

                const best = Object.entries(p.stats || {})

                    '<span class="pname">' + player.nat + ' ' + player.name + captainBadge + '</span>' +
                    getTooltip(player) +

            // Split bench: 7 panchina, rest tribuna
            const panchina = bench.slice(0, 7);
            const tribuna = bench.slice(7);
            
            function benchCard(p, benchIdx) {
                var teamCfg = getTeamConfig();

                    '<span class="nat-flag">' + p.nat + '</span>' +
                    '<span class="pos-badge">' + p.pos + '</span>' +
                    '<span class="sp-name">' + p.name + cptBadge + '</span>' +

                var footColor = isAx ? '#7db7ff' : (p.foot === 'L' ? '#ff8f7a' : (p.foot === 'R' ? '#ffbf69' : '#d0d0d0'));
                var isCpt = cfg.captain && p.name === cfg.captain;
                var cptBdg = isCpt ? '<span style="color:#ffd700;font-size:0.8em;margin-left:3px;">в’ё</span>' : '';
                var row = '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:4px;">';
                row += '<span class="ovr ' + getOvrClass(p.ovr) + '" style="min-width:36px;text-align:center;">' + p.ovr + '</span>';
                row += '<span style="min-width:40px;color:#888;font-size:0.85em;">' + p.pos + '</span>';

            }

            var rosterByRole = '';

                rosterByRole += '</div>';

                rosterByRole += '<button class="pos-tab active" onclick="setRosterSort(\'role\')" style="min-width:auto;padding:6px 12px;"><span class="pos-code">Ruoli</span></button>';

                        rosterByRole += renderRosterRow(p);

                });

            // View toggle

                '<button class="pos-tab' + (currentView === 'roster' ? ' active' : '') + '" onclick="setTeamView(\'roster\')" style="min-width:auto;padding:8px 16px;"><span class="pos-code">рџ“‹ Rosa</span></button>' +

                        '</div>' +

                    '<p style="text-align:center;color:#999;font-size:0.88em;line-height:1.35;padding-top:10px;margin:0 0 18px 0;">All. ' + (cfg.subtitle.split(',').slice(1).join(',').trim() || cfg.subtitle) + '</p>' +
                    viewToggle +
                    '<div id="team-view-formation" style="display:' + (currentView === 'formation' ? 'block' : 'none') + ';">' + formationView + '</div>' +
                    '<div id="team-view-roster" style="display:' + (currentView === 'roster' ? 'block' : 'none') + ';">' + rosterView + '</div>' +
                '</div>';
        }
        function setTeamView(view) {
            localStorage.setItem('pes_team_view_' + currentTeam, view);
            renderTeams();
        }
        function setRosterSort(mode) {
            localStorage.setItem('pes_roster_sort_' + currentTeam, mode);
            renderTeams();
        }
    </script>
</body>
</html>
